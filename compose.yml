version: "3.1"

services:
  db:
    image: mysql:8.3.0
    container_name: swappy_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: swappy
      MYSQL_DATABASE: swappy
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - ./db/.data:/var/lib/mysql
